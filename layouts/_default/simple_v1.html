{{ define "main" }}
  <article class="max-w-full">
    <header>
      <h1 style="margin-top: 20px" class="mt-0 text-4xl font-extrabold text-neutral-900 dark:text-neutral">
        {{ .Title | emojify }}
      </h1>
    </header>
    <section class="max-w-full mt-6 prose dark:prose-invert">
      {{ .Content }}
    </section>

  </article>
{{ end }}
